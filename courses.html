<!DOCTYPE html>
<html>
<head>
<title>Courses - Informative Quran Center</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Poppins;
  background:#0A2239;
  color:white;
}

nav {
  text-align:center;
  padding:15px;
}

nav a {
  color:white;
  margin:10px;
  text-decoration:none;
}

h1 {
  text-align:center;
  margin-top:30px;
}

.courses {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:40px;
}

.card {
  width:250px;
  padding:20px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  cursor:pointer;
  text-align:center;
  transition:0.3s;
}

.card:hover {
  background:#1E6FB8;
  transform:scale(1.05);
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:white;
  color:#0A2239;
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:650px;
  line-height:1.6;
}

.close {
  cursor:pointer;
  float:right;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="courses.html">Courses</a>
</nav>

<h1>Our Courses</h1>

<div class="courses">

<div class="card" onclick="openModal('basic')">Basic Essentials of Islam</div>
<div class="card" onclick="openModal('qaida')">Noorani Qaida</div>
<div class="card" onclick="openModal('reading')">Quran Reading</div>
<div class="card" onclick="openModal('tajweed')">Tajweed</div>
<div class="card" onclick="openModal('hifz')">Hifz-e-Quran</div>
<div class="card" onclick="openModal('tafseer')">Quran with Tafseer</div>
<div class="card" onclick="openModal('salah')">Salah Course</div>
<div class="card" onclick="openModal('arabic')">Arabic Language</div>
<div class="card" onclick="openModal('islam')">Basic Knowledge of Islam</div>
<div class="card" onclick="openModal('studies')">Islamic Studies</div>
<div class="card" onclick="openModal('seerah')">Seerah</div>
<div class="card" onclick="openModal('hadith')">Hadith Studies</div>
<div class="card" onclick="openModal('dua')">Dua & Zikr</div>
<div class="card" onclick="openModal('character')">Character Development</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<span class="close" onclick="closeModal()">✖</span>
<div id="modalData"></div>
</div>
</div>

<script>

function openModal(type){
let content="";

if(type==="basic"){
content=`<h2>Basic Essentials of Islam</h2>
<p>Learn the foundations of Islam including beliefs, pillars, and daily practices.</p>
<p><b>Hadith:</b> “Islam is built on five pillars.” (Bukhari & Muslim)</p>`;
}

if(type==="qaida"){
content=`<h2>Noorani Qaida</h2>
<p>Learn Arabic letters and pronunciation step by step.</p>
<p><b>Hadith:</b> “The best among you are those who learn the Quran.”</p>`;
}

if(type==="reading"){
content=`<h2>Quran Reading</h2>
<p>Read Quran fluently with correct pronunciation.</p>
<p><b>Hadith:</b> “The one proficient in the Quran will be with angels.”</p>`;
}

if(type==="tajweed"){
content=`<h2>Tajweed</h2>
<p>Improve recitation using proper rules.</p>
<p><b>Hadith:</b> “Beautify the Quran with your voices.”</p>`;
}

if(type==="hifz"){
content=`<h2>Hifz-e-Quran</h2>
<p>Memorize Quran with structured plans and revision.</p>
<p><b>Hadith:</b> “Recite and rise in rank.”</p>`;
}

if(type==="tafseer"){
content=`<h2>Quran with Tafseer</h2>
<p>Understand meanings and lessons of Quran.</p>`;
}

if(type==="salah"){
content=`<h2>Salah Course</h2>
<p>Learn correct method of prayer.</p>
<p><b>Hadith:</b> “Pray as you have seen me pray.”</p>`;
}

if(type==="arabic"){
content=`<h2>Arabic Language</h2>
<p>Learn Arabic to understand Quran directly.</p>`;
}

if(type==="islam"){
content=`<h2>Basic Knowledge of Islam</h2>
<p>Learn daily Islamic teachings.</p>`;
}

if(type==="studies"){
content=`<h2>Islamic Studies</h2>
<p>Learn fiqh and Islamic rulings.</p>`;
}

if(type==="seerah"){
content=`<h2>Seerah</h2>
<p>Life of Prophet Muhammad ﷺ.</p>`;
}

if(type==="hadith"){
content=`<h2>Hadith Studies</h2>
<p>Learn sayings of Prophet ﷺ.</p>`;
}

if(type==="dua"){
content=`<h2>Dua & Zikr</h2>
<p>Daily duas and remembrance of Allah.</p>`;
}

if(type==="character"){
content=`<h2>Character Development</h2>
<p>Improve Islamic manners and personality.</p>
<p><b>Hadith:</b> “The best among you are those with best character.”</p>`;
}

document.getElementById("modalData").innerHTML = content;
document.getElementById("modal").style.display = "flex";
}

function closeModal(){
document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
