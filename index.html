<!DOCTYPE html>
<html>
<head>
<title>Courses - Informative Quran Center</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body { font-family:Poppins; margin:0; background:#0A2239; color:white; }

nav { background:#0A2239; padding:15px; text-align:center; }
nav a { color:white; margin:10px; text-decoration:none; }

h1 { text-align:center; margin-top:40px; }

.courses {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:40px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  width:250px;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
}

.card:hover { background:#1E6FB8; }

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  color:black;
  padding:30px;
  border-radius:10px;
  max-width:500px;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="courses.html">Courses</a>
</nav>

<h1>Our Courses</h1>

<div class="courses">

<div class="card" onclick="openModal('basic')">Basic Essentials of Islam</div>
<div class="card" onclick="openModal('qaida')">Noorani Qaida</div>
<div class="card" onclick="openModal('reading')">Quran Reading</div>
<div class="card" onclick="openModal('tajweed')">Tajweed</div>
<div class="card" onclick="openModal('hifz')">Hifz-e-Quran</div>
<div class="card" onclick="openModal('tafseer')">Quran with Tafseer</div>
<div class="card" onclick="openModal('salah')">Salah Course</div>
<div class="card" onclick="openModal('arabic')">Arabic Language</div>
<div class="card" onclick="openModal('islam')">Basic Knowledge of Islam</div>
<div class="card" onclick="openModal('studies')">Islamic Studies</div>
<div class="card" onclick="openModal('seerah')">Seerah</div>
<div class="card" onclick="openModal('hadith')">Hadith Studies</div>
<div class="card" onclick="openModal('dua')">Dua & Zikr</div>
<div class="card" onclick="openModal('character')">Character Development</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <div class="modal-header">
      <span onclick="closeModal()" class="close-btn">✖</span>
      <h2 id="modalTitle"></h2>
    </div>

    <div class="modal-body" id="modalData"></div>

    <div class="modal-footer">
      <a href="https://wa.me/923277720007" class="enroll-btn">Enroll Now</a>
    </div>

  </div>
</div>

<script>

function openModal(type){
let content="";

if(type==="basic"){content=`<h2>Basic Islam</h2><p>Learn pillars of Islam.</p>`;}
if(type==="qaida"){content=`<h2>Noorani Qaida</h2><p>Learn Arabic basics.</p>`;}
if(type==="reading"){content=`<h2>Quran Reading</h2><p>Learn reading fluently.</p>`;}
if(type==="tajweed"){content=`<h2>Tajweed</h2><p>Improve recitation.</p>`;}
if(type==="hifz"){content=`<h2>Hifz</h2><p>Memorize Quran.</p>`;}
if(type==="tafseer"){content=`<h2>Tafseer</h2><p>Understand Quran.</p>`;}
if(type==="salah"){content=`<h2>Salah</h2><p>Learn prayer.</p>`;}
if(type==="arabic"){content=`<h2>Arabic</h2><p>Learn Arabic language.</p>`;}
if(type==="islam"){content=`<h2>Basic Islam</h2><p>Daily Islamic knowledge.</p>`;}
if(type==="studies"){content=`<h2>Islamic Studies</h2><p>Fiqh & teachings.</p>`;}
if(type==="seerah"){content=`<h2>Seerah</h2><p>Life of Prophet ﷺ.</p>`;}
if(type==="hadith"){content=`<h2>Hadith</h2><p>Sayings of Prophet ﷺ.</p>`;}
if(type==="dua"){content=`<h2>Dua</h2><p>Daily duas.</p>`;}
if(type==="character"){content=`<h2>Character</h2><p>Good manners.</p>`;}

document.getElementById("modalData").innerHTML=content;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
